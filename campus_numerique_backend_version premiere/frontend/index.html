<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉcoleNum | Portail Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .space-card {
            aspect-ratio: 1 / 0.85;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animation pour l'apparition du Dashboard */
        .animate-in {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Masquer les vues par défaut */
        .view.hidden {
            display: none;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] text-slate-900">

    <div id="view-home" class="view">
        <nav
            class="fixed top-0 w-full h-20 z-[200] px-12 flex items-center justify-between bg-white/80 backdrop-blur-md border-b border-slate-200">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='index.html'">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                    <i data-lucide="layout-grid" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter italic uppercase">ÉCOLE<span
                        class="text-indigo-600">NUM</span></span>
            </div>

            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="launch('ADMIN', 'Administration')"
                    class="p-2.5 text-slate-400 hover:bg-slate-50 hover:text-indigo-600 rounded-xl transition-all"
                    title="Admin"><i data-lucide="shield" class="w-5 h-5"></i></button>
                <button onclick="location.href='classes.html'"
                    class="p-2.5 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-all"
                    title="Élèves"><i data-lucide="graduation-cap" class="w-5 h-5"></i></button>
                <button onclick="launch('PROFESSEUR', 'Espace Professeur')"
                    class="p-2.5 text-slate-400 hover:bg-purple-50 hover:text-purple-600 rounded-xl transition-all"
                    title="Profs"><i data-lucide="book-marked" class="w-5 h-5"></i></button>
                <button onclick="launch('PARENT', 'Espace Parent')"
                    class="p-2.5 text-slate-400 hover:bg-rose-50 hover:text-rose-600 rounded-xl transition-all"
                    title="Parents"><i data-lucide="users" class="w-5 h-5"></i></button>
                <button onclick="launch('ANCIENS', 'Espace Anciens')"
                    class="p-2.5 text-slate-400 hover:bg-amber-50 hover:text-amber-600 rounded-xl transition-all"
                    title="Anciens"><i data-lucide="history" class="w-5 h-5"></i></button>
                <div class="w-px h-6 bg-slate-200 mx-2"></div>
                <button class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400"><i
                        data-lucide="bell" class="w-4 h-4"></i></button>
            </div>
        </nav>

        <main class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="text-5xl font-black italic text-slate-800 tracking-tight uppercase">Portail <span
                        class="text-indigo-600">Numérique</span></h1>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-4 italic opacity-70">
                    Sélectionnez votre espace d'accès</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div onclick="location.href='classes.html'"
                    class="space-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer flex flex-col items-center justify-center group">
                    <div
                        class="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="user"></i>
                    </div>
                    <h3 class="font-black italic text-lg uppercase text-slate-800">Élèves</h3>
                    <p
                        class="text-[9px] text-slate-400 font-bold tracking-widest mt-2 uppercase italic text-center px-4">
                        Le Grain de Sel & Orientation</p>
                </div>

                <div onclick="launch('PROFESSEUR', 'Espace Professeur')"
                    class="space-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer flex flex-col items-center justify-center group">
                    <div
                        class="w-14 h-14 bg-purple-50 text-purple-600 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="book-open"></i>
                    </div>
                    <h3 class="font-black italic text-lg uppercase text-slate-800">Professeurs</h3>
                    <p
                        class="text-[9px] text-slate-400 font-bold tracking-widest mt-2 uppercase italic text-center px-4">
                        Notes & Salle Virtuelle</p>
                </div>

                <div onclick="launch('PARENT', 'Espace Parent')"
                    class="space-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer flex flex-col items-center justify-center group">
                    <div class="w-14 h-14 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mb-4"><i
                            data-lucide="heart"></i></div>
                    <h3 class="font-black italic text-lg uppercase text-slate-800">Parents</h3>
                    <p
                        class="text-[9px] text-slate-400 font-bold tracking-widest mt-2 uppercase italic text-center px-4">
                        Suivi Scolaire de l'Enfant</p>
                </div>

                <div onclick="launch('APE', 'Bureau APE')"
                    class="space-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer flex flex-col items-center justify-center group">
                    <div
                        class="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="users-round"></i>
                    </div>
                    <h3 class="font-black italic text-lg uppercase text-slate-800">Bureau APE</h3>
                    <p
                        class="text-[9px] text-slate-400 font-bold tracking-widest mt-2 uppercase italic text-center px-4">
                        Cotisations & Projets</p>
                </div>

                <div onclick="launch('ANCIENS', 'Espace Anciens')"
                    class="space-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer flex flex-col items-center justify-center group">
                    <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mb-4">
                        <i data-lucide="history"></i>
                    </div>
                    <h3 class="font-black italic text-lg uppercase text-slate-800">Anciens</h3>
                    <p
                        class="text-[9px] text-slate-400 font-bold tracking-widest mt-2 uppercase italic text-center px-4">
                        Réseau Alumni & Mentorat</p>
                </div>

                <div onclick="launch('ADMIN', 'Administration')"
                    class="space-card bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer flex flex-col items-center justify-center group">
                    <div class="w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center mb-4"><i
                            data-lucide="settings"></i></div>
                    <h3 class="font-black italic text-lg uppercase text-slate-800">Direction</h3>
                    <p
                        class="text-[9px] text-slate-400 font-bold tracking-widest mt-2 uppercase italic text-center px-4">
                        Administration & Pilotage</p>
                </div>
            </div>
        </main>
    </div>

    <div id="view-app" class="view hidden flex min-h-screen">
        <aside class="w-72 bg-white h-screen sticky top-0 border-r border-slate-100 flex flex-col">
            <div class="p-8">
                <h1 class="text-xl font-black italic uppercase tracking-tighter">ÉCOLE<span
                        class="text-indigo-600">NUM</span></h1>
            </div>
            <div id="sidebar-menu" class="flex-1 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 p-10">
            <div id="app-stats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>

            <div id="app-content" class="animate-in"></div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
