<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | ÉcoleNum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
        }

        .login-card {
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input:focus {
            transform: scale(1.01);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

    <div class="login-card max-w-md w-full">
        <div class="text-center mb-10">
            <div
                class="bg-indigo-600 w-16 h-16 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-100 transition-transform hover:rotate-12">
                <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter text-slate-900">ÉCOLE<span
                    class="text-indigo-600">NUM</span></h1>
            <p id="portal-name"
                class="text-slate-400 font-bold text-[10px] tracking-[0.3em] mt-3 uppercase italic opacity-70">
                Chargement du portail...</p>
        </div>

        <div
            class="bg-white p-10 rounded-[3rem] shadow-xl shadow-slate-200/50 border border-slate-100 relative overflow-hidden">
            <div id="status-bar" class="absolute top-0 left-0 w-full h-1.5 bg-indigo-600 transition-all duration-500">
            </div>

            <form id="auth-form" class="space-y-6 mt-4" onsubmit="return false;">
                <div>
                    <label
                        class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-4 tracking-widest italic">Matricule
                        / Code Unique</label>
                    <div class="relative">
                        <i data-lucide="user"
                            class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300"></i>
                        <input type="text" id="username" placeholder="Entrez votre matricule" required
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-600 outline-none font-bold transition-all text-slate-700">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-black uppercase text-slate-400 mb-2 ml-4 tracking-widest italic">Mot
                        de passe</label>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300"></i>
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-600 outline-none font-bold transition-all text-slate-700">
                    </div>
                    <p id="activation-msg"
                        class="text-[9px] mt-4 hidden text-indigo-500 font-black italic uppercase tracking-tighter bg-indigo-50 p-2 rounded-lg text-center">
                        ✨ Premier accès : votre mot de passe sera défini.
                    </p>
                </div>

                <button type="button" id="btn-submit" onclick="handleLogin()"
                    class="w-full py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase italic shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 flex items-center justify-center gap-3">
                    Se connecter <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <button onclick="location.href='index.html'"
                class="text-slate-300 font-black uppercase text-[9px] tracking-[0.3em] hover:text-indigo-600 transition-all italic">
                Retour au portail principal
            </button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role') || 'UTILISATEUR';
        const context = params.get('context') || 'Espace Privé';
        document.getElementById('portal-name').innerText = `ACCÈS : ${context}`;

        // SECURITÉ 1 : Fonction de login asynchrone séparée
        async function handleLogin() {
            const btn = document.getElementById('btn-submit');
            const statusBar = document.getElementById('status-bar');
            const activationMsg = document.getElementById('activation-msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) { alert("Veuillez remplir tous les champs"); return; }

            btn.innerHTML = '<span class="animate-pulse">VÉRIFICATION EN COURS...</span>';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code_unique: username,
                        mot_de_passe: password,
                        role: role
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // SECURITÉ 2 : On attend que le localStorage confirme l'écriture
                    localStorage.setItem('user_session', JSON.stringify(data.user));

                    statusBar.style.backgroundColor = "#10B981";
                    btn.style.backgroundColor = "#10B981";
                    btn.innerText = "SÉCURITÉ VALIDÉE !";

                    // SECURITÉ 3 : Délai de confort (500ms) pour éviter que ça "ressorte"
                    // Cela laisse le temps au backend et au navigateur de se synchroniser
                    const redirectDelay = data.activated ? 2000 : 600;

                    if (data.activated) activationMsg.classList.remove('hidden');

                    setTimeout(() => {
                        // On utilise replace au lieu de href pour éviter les retours arrière buggés
                        const finalUrl = `index.html?auth=success&role=${role}&context=${encodeURIComponent(context)}`;
                        window.location.replace(finalUrl);
                    }, redirectDelay);

                } else { throw new Error(data.message || "Identifiants invalides"); }
            } catch (err) {
                statusBar.style.backgroundColor = "#EF4444";
                btn.style.backgroundColor = "#EF4444";
                btn.innerText = "ÉCHEC DE CONNEXION";
                alert(err.message);
                setTimeout(() => {
                    statusBar.style.backgroundColor = "#4F46E5";
                    btn.style.backgroundColor = "#4F46E5";
                    btn.innerText = "Se connecter";
                    btn.disabled = false;
                }, 2000);
            }
        }

        lucide.createIcons();
    </script>
</body>

</html>
