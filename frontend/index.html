<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÉcoleNum | Portail Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .space-card {
            aspect-ratio: 1 / 0.85;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Image de fond qui remplit toute la carte */
        .space-card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            z-index: 0;
        }

        .space-card:hover .space-card-bg {
            transform: scale(1.08);
        }

        /* Overlay sombre pour lisibilité du texte */
        .space-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.7));
            z-index: 1;
        }

        /* Contenu au-dessus de l'image */
        .space-card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .space-card-content h3 {
            font-size: 1.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .space-card-content p {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-align: center;
            opacity: 0.9;
        }

        /* Icône de fallback si pas d'image */
        .fallback-icon {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .fallback-icon i {
            width: 40px;
            height: 40px;
        }

        /* Animation pour l'apparition du Dashboard */
        .animate-in {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Masquer les vues par défaut */
        .view.hidden {
            display: none;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] text-slate-900">

    <div id="view-home" class="view">
        <nav
            class="fixed top-0 w-full h-16 z-[200] px-3 md:px-12 flex items-center justify-between bg-white/80 backdrop-blur-md border-b border-slate-200">
            <div class="flex items-center gap-2 cursor-pointer flex-shrink-0" onclick="location.href='index.html'">
                <div id="logo-container" class="bg-indigo-600 p-2 rounded-xl shadow-lg shadow-indigo-200">
                    <i data-lucide="layout-grid" class="text-white w-5 h-5"></i>
                </div>
                <span id="ecole-nom-index" class="text-xl font-black tracking-tighter italic uppercase">ÉCOLE<span
                        class="text-indigo-600">NUM</span></span>
            </div>

            <div class="flex items-center gap-1 md:gap-3">
                <button onclick="launch('DIRECTION', 'Administration')"
                    class="p-2 text-slate-400 hover:bg-slate-50 hover:text-indigo-600 rounded-xl transition-all"
                    title="Admin"><i data-lucide="shield" class="w-4 h-4"></i></button>
                <button onclick="location.href='classes.html'"
                    class="p-2 text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 rounded-xl transition-all"
                    title="Élèves"><i data-lucide="graduation-cap" class="w-4 h-4"></i></button>
                <button onclick="launch('PROFESSEUR', 'Espace Professeur')"
                    class="p-2 text-slate-400 hover:bg-purple-50 hover:text-purple-600 rounded-xl transition-all"
                    title="Profs"><i data-lucide="book-marked" class="w-4 h-4"></i></button>
                <button onclick="launch('PARENT', 'Espace Parent')"
                    class="p-2 text-slate-400 hover:bg-rose-50 hover:text-rose-600 rounded-xl transition-all"
                    title="Parents"><i data-lucide="users" class="w-4 h-4"></i></button>
                <button onclick="launch('ALUMNI', 'Espace Anciens')"
                    class="hidden sm:inline-flex p-2 text-slate-400 hover:bg-amber-50 hover:text-amber-600 rounded-xl transition-all"
                    title="Anciens"><i data-lucide="history" class="w-4 h-4"></i></button>
            </div>
        </nav>

        <main class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="text-5xl font-black italic text-slate-800 tracking-tight uppercase">Portail <span
                        class="text-indigo-600">Numérique</span></h1>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.4em] mt-4 italic opacity-70">
                    Sélectionnez votre espace d'accès</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Élèves -->
                <div onclick="location.href='classes.html'"
                    class="space-card bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer"
                    data-espace="eleves">
                    <div class="space-card-content">
                        <h3>Élèves</h3>
                        <p>Le Grain de Sel & Orientation</p>
                    </div>
                </div>

                <!-- Professeurs -->
                <div onclick="launch('PROFESSEUR', 'Espace Professeur')"
                    class="space-card bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer"
                    data-espace="professeurs">
                    <div class="space-card-content">
                        <h3>Professeurs</h3>
                        <p>Notes & Salle Virtuelle</p>
                    </div>
                </div>

                <!-- Parents -->
                <div onclick="launch('PARENT', 'Espace Parent')"
                    class="space-card bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer"
                    data-espace="parents">
                    <div class="space-card-content">
                        <h3>Parents</h3>
                        <p>Suivi Scolaire de l'Enfant</p>
                    </div>
                </div>

                <!-- Bureau APE -->
                <div onclick="launch('APE', 'Bureau APE')"
                    class="space-card bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer"
                    data-espace="ape">
                    <div class="space-card-content">
                        <h3>Bureau APE</h3>
                        <p>Cotisations & Projets</p>
                    </div>
                </div>

                <!-- Anciens -->
                <div onclick="launch('ALUMNI', 'Espace Anciens')"
                    class="space-card bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer"
                    data-espace="alumni">
                    <div class="space-card-content">
                        <h3>Anciens</h3>
                        <p>Réseau Alumni & Mentorat</p>
                    </div>
                </div>

                <!-- Direction -->
                <div onclick="launch('DIRECTION', 'Administration')"
                    class="space-card bg-white rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-2 cursor-pointer"
                    data-espace="direction">
                    <div class="space-card-content">
                        <h3>Direction</h3>
                        <p>Administration & Pilotage</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="view-app" class="view hidden flex min-h-screen">
        <aside class="w-72 bg-white h-screen sticky top-0 border-r border-slate-100 flex flex-col">
            <div class="p-8">
                <h1 class="text-xl font-black italic uppercase tracking-tighter">ÉCOLE<span
                        class="text-indigo-600">NUM</span></h1>
            </div>
            <div id="sidebar-menu" class="flex-1 overflow-y-auto"></div>
        </aside>

        <main class="flex-1 p-10">
            <div id="app-stats" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10"></div>

            <div id="app-content" class="animate-in"></div>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();

        // ============================================================
        // CHARGER LES IMAGES DE FOND POUR LES CARTES D'ESPACES
        // ============================================================
        async function chargerImagesEspaces() {
            const cards = document.querySelectorAll('.space-card');

            for (const card of cards) {
                const espace = card.getAttribute('data-espace');
                if (!espace) continue;

                try {
                    const response = await fetch(`/api/admin/espace-image/${espace}`);
                    const data = await response.json();

                    if (data.success && data.image && data.image.url_image) {
                        // Ajouter l'image de fond
                        const img = document.createElement('img');
                        img.src = data.image.url_image;
                        img.className = 'space-card-bg';
                        img.alt = card.querySelector('h3')?.textContent || espace;

                        // Ajouter l'overlay sombre
                        const overlay = document.createElement('div');
                        overlay.className = 'space-card-overlay';

                        // Nettoyer les anciens éléments
                        const oldBg = card.querySelector('.space-card-bg');
                        const oldOverlay = card.querySelector('.space-card-overlay');
                        if (oldBg) oldBg.remove();
                        if (oldOverlay) oldOverlay.remove();

                        // Ajouter au début
                        card.insertBefore(overlay, card.firstChild);
                        card.insertBefore(img, card.firstChild);

                        // Changer la couleur de fond par défaut
                        card.style.backgroundColor = 'transparent';

                        console.log(`✅ Image de fond chargée pour ${espace}: ${data.image.url_image}`);
                    } else {
                        // Fallback : couleur de fond avec dégradé
                        const colors = {
                            eleves: 'linear-gradient(135deg, #4F46E5, #7C3AED)',
                            professeurs: 'linear-gradient(135deg, #7C3AED, #DB2777)',
                            parents: 'linear-gradient(135deg, #F43F5E, #F97316)',
                            ape: 'linear-gradient(135deg, #10B981, #14B8A6)',
                            alumni: 'linear-gradient(135deg, #F59E0B, #EF4444)',
                            direction: 'linear-gradient(135deg, #1F2937, #111827)'
                        };
                        card.style.background = colors[espace] || 'linear-gradient(135deg, #3B82F6, #1E40AF)';
                        card.style.backgroundSize = 'cover';

                        // Ajouter une icône en fallback
                        const icons = {
                            eleves: 'user',
                            professeurs: 'book-open',
                            parents: 'heart',
                            ape: 'users-round',
                            alumni: 'history',
                            direction: 'settings'
                        };

                        const contentDiv = card.querySelector('.space-card-content');
                        const existingIcon = contentDiv.querySelector('.fallback-icon');
                        if (!existingIcon) {
                            const iconDiv = document.createElement('div');
                            iconDiv.className = 'fallback-icon';
                            iconDiv.innerHTML = `<i data-lucide="${icons[espace] || 'circle'}" class="w-10 h-10"></i>`;
                            contentDiv.insertBefore(iconDiv, contentDiv.firstChild);
                            lucide.createIcons();
                        }

                        console.log(`⚠️ Image non trouvée pour ${espace}, fallback avec couleur`);
                    }
                } catch (error) {
                    console.error(`❌ Erreur chargement image pour ${espace}:`, error);
                    // Fallback couleur
                    const colors = {
                        eleves: 'linear-gradient(135deg, #4F46E5, #7C3AED)',
                        professeurs: 'linear-gradient(135deg, #7C3AED, #DB2777)',
                        parents: 'linear-gradient(135deg, #F43F5E, #F97316)',
                        ape: 'linear-gradient(135deg, #10B981, #14B8A6)',
                        alumni: 'linear-gradient(135deg, #F59E0B, #EF4444)',
                        direction: 'linear-gradient(135deg, #1F2937, #111827)'
                    };
                    card.style.background = colors[espace] || 'linear-gradient(135deg, #3B82F6, #1E40AF)';
                }
            }
        }

        // ============================================================
        // CHARGER LA CONFIGURATION DE L'ÉCOLE (NOM + LOGO)
        // ============================================================
        async function chargerConfigEcole() {
            try {
                const response = await fetch('/api/admin/config');
                const data = await response.json();
                if (data.success && data.config) {
                    const nomElem = document.getElementById('ecole-nom-index');
                    if (nomElem) {
                        nomElem.textContent = data.config.nom_etablissement;
                        nomElem.classList.add('text-indigo-600');
                    }

                    if (data.config.logo_url) {
                        const logoContainer = document.getElementById('logo-container');
                        if (logoContainer) {
                            // Agrandir le conteneur pour un logo plus visible
                            logoContainer.style.width = '56px';
                            logoContainer.style.height = '56px';
                            logoContainer.style.padding = '6px';
                            logoContainer.style.background = 'linear-gradient(135deg, #4F46E5, #7C3AED)';
                            logoContainer.style.borderRadius = '14px';
                            logoContainer.style.display = 'flex';
                            logoContainer.style.alignItems = 'center';
                            logoContainer.style.justifyContent = 'center';
                            logoContainer.innerHTML = `<img src="${data.config.logo_url}" alt="logo" class="w-10 h-10 object-contain">`;
                        }
                    }
                }
            } catch (error) {
                console.error('Erreur chargement config:', error);
            }
        }

        // Charger au démarrage
        document.addEventListener('DOMContentLoaded', () => {
            chargerImagesEspaces();
            chargerConfigEcole();
            lucide.createIcons();
        });
    </script>
</body>

</html>
