<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <script src="config.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion | Campus Numérique FASO</title>
  <link rel="stylesheet" href="responsive.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0C1A;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 102, 241, .06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, .06) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
    }

    .glow-1 {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, .18) 0%, transparent 70%);
      top: -120px;
      left: -120px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, .14) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 0 20px;
      animation: fadeUp .6s cubic-bezier(.22, 1, .36, 1);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 32px rgba(99, 102, 241, .4);
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.9rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -.03em;
    }

    .logo-title span {
      color: #818CF8;
    }

    .logo-sub {
      font-size: .63rem;
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .28);
      margin-top: 7px;
    }

    .card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 24px;
      padding: 32px 32px 28px;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #6366F1, #8B5CF6);
      border-radius: 24px 24px 0 0;
      transition: background .4s;
    }

    .role-badge {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(99, 102, 241, .12);
      border: 1px solid rgba(99, 102, 241, .25);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 18px;
      font-size: .72rem;
      font-weight: 700;
      color: #A5B4FC;
    }

    .role-badge.on {
      display: flex;
    }

    .role-dot {
      width: 7px;
      height: 7px;
      min-width: 7px;
      border-radius: 50%;
      background: #818CF8;
      animation: pulseD 1.5s infinite;
    }

    @keyframes pulseD {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(129, 140, 248, .5)
      }

      60% {
        box-shadow: 0 0 0 5px rgba(129, 140, 248, 0)
      }
    }

    .activation-msg {
      display: none;
      background: rgba(99, 102, 241, .1);
      border: 1px solid rgba(99, 102, 241, .2);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: .73rem;
      font-weight: 700;
      color: #A5B4FC;
      text-align: center;
    }

    .field-label {
      font-size: .62rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .15em;
      color: rgba(255, 255, 255, .32);
      margin-bottom: 8px;
      display: block;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    .input-wrap svg.ico {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      stroke: rgba(255, 255, 255, .2);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: .2s;
    }

    .input-wrap:focus-within svg.ico {
      stroke: rgba(129, 140, 248, .7);
    }

    .input-field {
      width: 100%;
      padding: 14px 14px 14px 42px;
      background: rgba(255, 255, 255, .06);
      border: 1.5px solid rgba(255, 255, 255, .08);
      border-radius: 14px;
      font-size: .88rem;
      font-weight: 600;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: all .2s;
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, .17);
    }

    .input-field:focus {
      border-color: rgba(99, 102, 241, .6);
      background: rgba(99, 102, 241, .08);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .12);
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      color: rgba(255, 255, 255, .22);
      transition: .2s;
    }

    .pw-toggle:hover {
      color: rgba(255, 255, 255, .6);
    }

    .pw-toggle svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      border: none;
      border-radius: 14px;
      font-size: .9rem;
      font-weight: 800;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, .3);
      margin-top: 4px;
      letter-spacing: .02em;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(99, 102, 241, .4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .error-box {
      display: none;
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: .76rem;
      font-weight: 700;
      color: #FCA5A5;
      margin-top: 14px;
      text-align: center;
    }

    .back-link {
      text-align: center;
      margin-top: 22px;
      font-size: .64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .2em;
      color: rgba(255, 255, 255, .2);
      cursor: pointer;
      transition: .2s;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      display: block;
    }

    .back-link:hover {
      color: rgba(255, 255, 255, .5);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="container">

    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>
      <div class="logo-title">CAMPUS<span>FASO</span></div>
      <div class="logo-sub">Portail Numérique · Burkina Faso</div>
    </div>

    <div class="card">
      <div class="status-bar" id="status-bar"></div>

      <div class="role-badge" id="role-badge">
        <div class="role-dot"></div>
        <span id="role-badge-txt">Rôle détecté</span>
      </div>

      <div class="activation-msg" id="activation-msg">
        ✨ Compte activé avec succès ! Reconnectez-vous avec ce mot de passe.
      </div>

      <label class="field-label">Matricule · Code Unique</label>
      <div class="input-wrap">
        <input type="text" class="input-field" id="username" placeholder="CN-2026-XXXX / PROF-2026-XXX..."
          autocomplete="off" autocapitalize="characters" oninput="detectRole(this.value)"
          onkeydown="if(event.key==='Enter')document.getElementById('password').focus()">
        <svg class="ico" viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </div>

      <label class="field-label">Mot de Passe</label>
      <div class="input-wrap">
        <input type="password" class="input-field" id="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')handleLogin()">
        <svg class="ico" viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <button class="pw-toggle" onclick="togglePw()" type="button">
          <svg id="ico-show" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg id="ico-hide" viewBox="0 0 24 24" style="display:none">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
        </button>
      </div>

      <button class="btn-login" id="btn-login" onclick="handleLogin()" type="button">
        <svg viewBox="0 0 24 24">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <polyline points="10 17 15 12 10 7" />
          <line x1="15" y1="12" x2="3" y2="12" />
        </svg>
        Se connecter
      </button>

      <div class="error-box" id="error-box"></div>
    </div>

    <button class="back-link" onclick="window.location.href='index.html'">← Retour au portail principal</button>
  </div>

  <script>
    // ══ Préfixes → rôle ══
    const PREFIXES = {
      'CN-': { role: 'ELEVE', label: 'Espace Élève', page: 'eleve.html' },
      'PROF-': { role: 'PROFESSEUR', label: 'Espace Professeur', page: 'professeur.html' },
      'PAR-': { role: 'PARENT', label: 'Espace Parent', page: 'parent.html' },
      'DIR-': { role: 'DIRECTION', label: 'Espace Direction', page: 'direction.html' },
      'SURV-': { role: 'SURVEILLANT', label: 'Espace Surveillant', page: 'direction.html' },
      'ALUMNI-': { role: 'ALUMNI', label: 'Espace Alumni', page: 'alumni.html' },
    };

    // Rôle également passable via URL (ancien système)
    const urlRole = new URLSearchParams(window.location.search).get('role');
    let detectedInfo = null;

    function detectRole(val) {
      const v = val.toUpperCase();
      detectedInfo = null;
      for (const prefix in PREFIXES) {
        if (v.startsWith(prefix)) {
          detectedInfo = PREFIXES[prefix];
          document.getElementById('role-badge-txt').textContent = '✓ ' + detectedInfo.label;
          document.getElementById('role-badge').classList.add('on');
          return;
        }
      }
      document.getElementById('role-badge').classList.remove('on');
    }

    function togglePw() {
      const pw = document.getElementById('password');
      const s = document.getElementById('ico-show');
      const h = document.getElementById('ico-hide');
      if (pw.type === 'password') { pw.type = 'text'; s.style.display = 'none'; h.style.display = ''; }
      else { pw.type = 'password'; s.style.display = ''; h.style.display = 'none'; }
    }

    // ══ Redirection depuis le rôle renvoyé par le backend ══
    function pageForRole(roleActuel) {
      const map = {
        ELEVE: 'eleve.html',
        PROFESSEUR: 'professeur.html',
        PARENT: 'parent.html',
        DIRECTION: 'direction.html',
        SURVEILLANT: 'direction.html',
        ALUMNI: 'alumni.html',
      };
      return map[roleActuel] || null;
    }

    function setBtn(state, text) {
      const btn = document.getElementById('btn-login');
      const bar = document.getElementById('status-bar');
      if (state === 'loading') {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div>' + (text || 'Vérification...');
        bar.style.background = 'linear-gradient(90deg,#6366F1,#8B5CF6)';
      } else if (state === 'success') {
        btn.style.background = 'linear-gradient(135deg,#10B981,#059669)';
        btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> ' + (text || 'Connexion réussie !');
        bar.style.background = 'linear-gradient(90deg,#10B981,#059669)';
      } else {
        btn.disabled = false;
        btn.style.background = '';
        btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Se connecter';
        bar.style.background = 'linear-gradient(90deg,#EF4444,#DC2626)';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('error-box');
      el.textContent = '⚠️ ' + msg;
      el.style.display = 'block';
    }
    function hideErr() { document.getElementById('error-box').style.display = 'none'; }

    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      hideErr();

      if (!username) { showErr('Entrez votre matricule.'); return; }
      if (!password) { showErr('Entrez votre mot de passe.'); return; }

      setBtn('loading');

      try {
        const body = { code_unique: username, mot_de_passe: password };
        // On envoie le rôle seulement si détecté (optionnel, le backend le retrouve tout seul)
        const roleToSend = detectedInfo?.role || urlRole;
        if (roleToSend) body.role = roleToSend;

        const resp = await fetch((window.API_BASE || (window.API_BASE||'http://localhost:5000/api')) + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await resp.json();

        // ══ CAS 1 : Activation premier accès ══
        if (data.activated) {
          document.getElementById('activation-msg').style.display = 'block';
          document.getElementById('password').value = '';
          setBtn('success', 'Compte activé — Reconnectez-vous');
          setTimeout(() => { setBtn('idle'); }, 3000);
          return;
        }

        // ══ CAS 2 : Erreur ══
        if (!resp.ok || !data.success) {
          setBtn('error');
          showErr(data.message || 'Identifiants invalides. Vérifiez votre matricule et mot de passe.');
          return;
        }

        // ══ CAS 3 : Succès ══
        const user = data.user || {};
        const roleActuel = user.role_actuel;

        // Stocker tout ce dont les pages ont besoin
        localStorage.setItem('token', data.token || '');
        localStorage.setItem('currentUser', JSON.stringify({
          ...user,
          classe: user.classe_actuelle || user.classe || '',
          matricule: user.code_unique || username,
        }));
        // Compatibilité ancienne clé (direction.html, etc.)
        localStorage.setItem('user_session', JSON.stringify({
          ...user,
          token: data.token,
          classe: user.classe_actuelle || user.classe || '',
        }));

        // Trouver la page cible
        // Priorité : rôle backend > rôle détecté par préfixe > rôle URL
        const targetPage = pageForRole(roleActuel)
          || detectedInfo?.page
          || (urlRole ? pageForRole(urlRole) : null)
          || 'index.html';

        setBtn('success');

        setTimeout(() => {
          window.location.replace(targetPage);
        }, 700);

      } catch (err) {
        setBtn('error');
        if (err.message && (err.message.includes('fetch') || err.message.includes('network'))) {
          showErr('Impossible de contacter le serveur. Vérifiez que le serveur est bien démarré (lancer.bat).');
        } else {
          showErr(err.message || 'Erreur inattendue.');
        }
      }
    }
  </script>
  <script src="responsive-init.js"></script>
</body>

</html>
