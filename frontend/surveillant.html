<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveillant | Tableau de bord</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #F8FAFC
        }
    </style>
    <link rel="stylesheet" href="responsive.css">
</head>

<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center">
                    <i data-lucide="shield-check" class="text-indigo-600 w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black">Espace Surveillant</h1>
                    <p class="text-sm text-slate-500">Tableau de bord individuel</p>
                </div>
            </div>
            <div>
                <button id="logoutBtn" class="px-4 py-2 bg-rose-500 text-white rounded-lg">Déconnexion</button>
            </div>
        </header>

        <section class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm mb-6 flex gap-6 items-center">
            <div class="w-28 h-28 rounded-2xl bg-slate-50 flex items-center justify-center overflow-hidden">
                <img id="profilePhoto" src="https://ui-avatars.com/api/?background=5b21b6&color=fff&size=256&name=--"
                    alt="photo" class="w-full h-full object-cover">
            </div>
            <div>
                <h2 id="survName" class="text-xl font-black"></h2>
                <p id="survPoste" class="text-sm text-slate-500"></p>
                <p id="survCode" class="text-xs text-slate-400 mt-2"></p>
            </div>
        </section>
        <section class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm mb-6">
            <label class="block text-sm font-black mb-2">Photo de profil</label>
            <div class="flex items-center gap-3">
                <input type="file" id="photoInput" accept="image/*">
                <button id="btnUploadPhoto" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Enregistrer</button>
                <span id="uploadMsg" class="text-sm text-slate-500"></span>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-2xl border shadow-sm text-center">
                <h3 class="font-black text-slate-800">Absences</h3>
                <p id="countAbsences" class="text-3xl font-black text-indigo-600 my-3">--</p>
                <button id="btnViewAbsences" class="px-4 py-2 bg-indigo-600 text-white rounded-lg">Voir</button>
            </div>

            <div class="bg-white p-6 rounded-2xl border shadow-sm text-center">
                <h3 class="font-black text-slate-800">Convocations</h3>
                <p id="countConv" class="text-3xl font-black text-amber-600 my-3">--</p>
                <button id="btnViewConv" class="px-4 py-2 bg-amber-600 text-white rounded-lg">Voir</button>
            </div>

            <div class="bg-white p-6 rounded-2xl border shadow-sm text-center">
                <h3 class="font-black text-slate-800">Incidents</h3>
                <p id="countIncidents" class="text-3xl font-black text-rose-600 my-3">--</p>
                <button id="btnViewInc" class="px-4 py-2 bg-rose-600 text-white rounded-lg">Voir</button>
            </div>
        </section>

        <section id="results" class="space-y-4"></section>
    </div>

    <script>
        // Vérifier session
        const session = JSON.parse(localStorage.getItem('user_session') || 'null');
        if (!session || !session.token) {
            alert('Veuillez vous connecter.');
            window.location.href = 'login.html?role=SURVEILLANT&context=Surveillance';
        }

        // Afficher infos
        document.getElementById('survName').innerText = session.prenom + ' ' + session.nom;
        document.getElementById('survPoste').innerText = session.poste_occupe || (session.role_actuel || 'Surveillant');
        document.getElementById('survCode').innerText = session.code_unique || '';
        const initials = encodeURIComponent((session.prenom || '')[0] + (session.nom || '')[0]);
        document.getElementById('profilePhoto').src = `https://ui-avatars.com/api/?background=5b21b6&color=fff&size=256&name=${initials}`;

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = 'index.html'; });

        const headers = { 'Authorization': 'Bearer ' + session.token, 'Content-Type': 'application/json' };

        async function loadCounts() {
            try {
                // Absences
                const a = await fetch('/api/surveillants/absences', { headers });
                const da = await a.json();
                document.getElementById('countAbsences').innerText = da.count || (da.absences ? da.absences.length : 0);

                // Convocations
                const c = await fetch('/api/surveillants/convocations', { headers });
                const dc = await c.json();
                document.getElementById('countConv').innerText = dc.count || (dc.convocations ? dc.convocations.length : 0);

                // Incidents
                const i = await fetch('/api/surveillants/incidents', { headers });
                const di = await i.json();
                document.getElementById('countIncidents').innerText = di.count || (di.incidents ? di.incidents.length : 0);

            } catch (err) {
                console.error('Erreur chargement données surveillant', err);
            }
        }

        function renderList(title, items, fields) {
            const container = document.getElementById('results');
            container.innerHTML = `<div class=\"bg-white p-6 rounded-2xl border shadow-sm\"><h3 class=\"font-black mb-4\">${title}</h3>` +
                (items.length === 0 ? '<p class=\"text-slate-500\">Aucun élément</p>' : '<ul class=\"space-y-2\">' + items.map(it => `<li class=\"p-3 bg-slate-50 rounded-lg border\">${fields.map(f => `<div><strong>${f.label}:</strong> ${it[f.key] || ''}</div>`).join('')} </li>`).join('') + '</ul>') + '</div>';
        }

        document.getElementById('btnViewAbsences').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/surveillants/absences', { headers });
                const d = await res.json();
                renderList('Absences récentes', d.absences || [], [{ label: 'Élève', key: 'id_eleve' }, { label: 'Date', key: 'date_absence' }, { label: 'Motif', key: 'raison_absence' }]);
            } catch (err) { alert('Erreur'); }
        });

        document.getElementById('btnViewConv').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/surveillants/convocations', { headers });
                const d = await res.json();
                renderList('Convocations', d.convocations || [], [{ label: 'Élève', key: 'id_eleve' }, { label: 'Sujet', key: 'sujet' }, { label: 'Date', key: 'date_convocation' }]);
            } catch (err) { alert('Erreur'); }
        });

        document.getElementById('btnViewInc').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/surveillants/incidents', { headers });
                const d = await res.json();
                renderList('Incidents', d.incidents || [], [{ label: 'Titre', key: 'titre' }, { label: 'Type', key: 'type_incident' }, { label: 'Date', key: 'date_signalement' }]);
            } catch (err) { alert('Erreur'); }
        });

        // Chargement initial
        loadCounts();
        if (window.lucide) lucide.createIcons();

        // Upload photo handler
        document.getElementById('btnUploadPhoto').addEventListener('click', async () => {
            const input = document.getElementById('photoInput');
            const msg = document.getElementById('uploadMsg');
            if (!input.files || input.files.length === 0) { alert('Choisissez une image'); return; }
            const file = input.files[0];
            const form = new FormData();
            form.append('photo', file);
            msg.innerText = 'Envoi en cours...';
            try {
                const res = await fetch('/api/surveillants/photo', { method: 'POST', headers: { 'Authorization': 'Bearer ' + session.token }, body: form });
                const d = await res.json();
                if (res.ok) {
                    document.getElementById('profilePhoto').src = d.photo_url + '?v=' + Date.now();
                    msg.innerText = 'Photo enregistrée.';
                } else {
                    msg.innerText = d.message || 'Erreur';
                }
            } catch (err) { console.error(err); msg.innerText = 'Erreur réseau'; }
            setTimeout(() => msg.innerText = '', 3000);
        });
    </script>
    <script src="config.js"></script>
    <script src="responsive-init.js"></script>
</body>

</html>
