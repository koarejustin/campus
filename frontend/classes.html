<head>

    <link rel="stylesheet" href="responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #F8FAFC;
            overflow-x: hidden;
        }

        /* Animation d'entrée globale */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-card {
            opacity: 0;
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Effet de survol ultra-propre */
        .class-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .class-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px -12px rgba(99, 102, 241, 0.15);
            background-color: white;
        }

        /* Petit reflet brillant au survol */
        .class-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            transition: 0.8s;
            opacity: 0;
        }

        .class-card:hover::after {
            opacity: 1;
            left: 100%;
            top: 100%;
        }

        /* Délais d'animation pour l'effet de cascade (10 cartes) */
        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.15s;
        }

        .delay-3 {
            animation-delay: 0.2s;
        }

        .delay-4 {
            animation-delay: 0.25s;
        }

        .delay-5 {
            animation-delay: 0.3s;
        }

        .delay-6 {
            animation-delay: 0.35s;
        }

        .delay-7 {
            animation-delay: 0.4s;
        }

        .delay-8 {
            animation-delay: 0.45s;
        }

        .delay-9 {
            animation-delay: 0.5s;
        }

        .delay-10 {
            animation-delay: 0.55s;
        }
    </style>
    <style>
    @media (max-width: 639px) {
      /* Nav : logo + boutons sur même ligne mais compacts */
      nav { padding: 10px 14px !important; }
      nav .flex.gap-4 { gap: 6px !important; }
      nav button { width: 34px !important; height: 34px !important; padding: 0 !important; display: flex; align-items: center; justify-content: center; }
      /* Titre principal */
      h1 { font-size: 2.2rem !important; }
      /* Grilles de classes : 2 colonnes toujours */
      .grid.grid-cols-2 { grid-template-columns: 1fr 1fr !important; gap: 10px !important; }
      /* Layout 2 colonnes collège/lycée → 1 colonne */
      .grid.grid-cols-1.lg\\:grid-cols-2 { grid-template-columns: 1fr !important; gap: 24px !important; }
      /* Cartes de classe plus compactes */
      .class-card { padding: 24px 10px !important; border-radius: 20px !important; }
      .class-card span:first-child { font-size: 1.8rem !important; }
    }
    @media (max-width: 380px) {
      h1 { font-size: 1.7rem !important; }
      .class-card span:first-child { font-size: 1.5rem !important; }
    }
    </style>
</head>
